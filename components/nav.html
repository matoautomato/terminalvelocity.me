<!-- Nav logo typewriter -->
<script>
(function() {
  const short = 'ml';
  const full = 'matthias leyendecker';
  const textEl = document.getElementById('nav-logo-text');
  const logoEl = document.getElementById('nav-logo');
  let typing = false;
  let timeout = null;

  function typeOut(from, to, callback) {
    if (typing) return;
    typing = true;
    let i = from.length;
    function step() {
      if (i <= to.length) {
        textEl.textContent = to.slice(0, i);
        i++;
        timeout = setTimeout(step, 60);
      } else {
        typing = false;
        if (callback) callback();
      }
    }
    step();
  }

  function eraseBack(from, to, callback) {
    if (typing) return;
    typing = true;
    let i = from.length;
    function step() {
      if (i >= to.length) {
        textEl.textContent = from.slice(0, i);
        i--;
        timeout = setTimeout(step, 30);
      } else {
        typing = false;
        if (callback) callback();
      }
    }
    step();
  }

  const phrases = [full, 'terminal velocity'];
  let phraseIndex = 0;
  let cycling = false;
  let paused = false;

  function cycle() {
    if (paused) return;
    cycling = true;
    const target = phrases[phraseIndex];
    typeOut(textEl.textContent, target, () => {
      timeout = setTimeout(() => {
        if (paused) return;
        eraseBack(textEl.textContent, short, () => {
          phraseIndex = (phraseIndex + 1) % phrases.length;
          cycling = false;
          timeout = setTimeout(cycle, 1500);
        });
      }, 2500);
    });
  }

  // Start cycling after initial pause
  timeout = setTimeout(cycle, 3000);

  // Pause cycling on hover, resume on leave
  logoEl.addEventListener('mouseenter', () => {
    paused = true;
    clearTimeout(timeout);
    typing = false;
    typeOut(textEl.textContent, full, () => {});
  });

  logoEl.addEventListener('mouseleave', () => {
    paused = false;
    clearTimeout(timeout);
    typing = false;
    eraseBack(textEl.textContent, short, () => {
      phraseIndex = 0;
      timeout = setTimeout(cycle, 2000);
    });
  });
})();
</script>

<!-- Mobile menu JS -->
<script>
const menuToggle = document.getElementById('menu-toggle');
const mobileMenu = document.getElementById('mobile-menu');
const bar1 = document.getElementById('bar1');
const bar2 = document.getElementById('bar2');
const bar3 = document.getElementById('bar3');
let menuOpen = false;
function closeMobileMenu() {
  menuOpen = false;
  mobileMenu.classList.add('hidden');
  mobileMenu.classList.remove('flex');
  bar1.style.transform = '';
  bar2.style.opacity = '';
  bar3.style.transform = '';
}
menuToggle.addEventListener('click', () => {
  menuOpen = !menuOpen;
  if (menuOpen) {
    mobileMenu.classList.remove('hidden');
    mobileMenu.classList.add('flex');
    bar1.style.transform = 'translateY(8px) rotate(45deg)';
    bar2.style.opacity = '0';
    bar3.style.transform = 'translateY(-8px) rotate(-45deg)';
  } else {
    closeMobileMenu();
  }
});
</script>
